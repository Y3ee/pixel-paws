name: Deploy Vite Site

on:
  push:
    branches:
      - main  # Change this to master if your main branch is named master
      - quest

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npx vite build --base=/pixel-paws/

      - name: Upload production assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # This tells GitHub to host your build folder!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
